name: Skills CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate-skills:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest PyYAML

      - name: Validate native skills format
        run: python scripts/validate_skills.py

      - name: Validate OpenCode compatibility
        run: python scripts/validate_skills.py --opencode-compatible

      - name: Validate OpenCode integration fixtures
        run: python scripts/validate_skills.py --root integration/fixtures --opencode-compatible

      - name: Export production skills contract
        run: |
          python scripts/export_skills_contract.py --scope production --output /tmp/skills-contract.json --pretty
          python -m json.tool /tmp/skills-contract.json >/dev/null

      - name: Export integration fixture skills contract
        run: |
          python scripts/export_skills_contract.py --root integration/fixtures --scope integration-fixtures --output /tmp/skills-fixtures-contract.json --pretty
          python -m json.tool /tmp/skills-fixtures-contract.json >/dev/null

      - name: Run tests
        run: python -m pytest -q

      - name: Run skills smoke script
        run: integration/scripts/smoke_skills.sh

      - name: Ensure generated OpenCode artifacts are not committed
        run: |
          test ! -d .opencode
          test ! -f skills-index.json
