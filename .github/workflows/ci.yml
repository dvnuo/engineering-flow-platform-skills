name: Skills CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate-skills:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest PyYAML

      - name: Validate native skills format
        run: python scripts/validate_skills.py

      - name: Validate OpenCode compatibility
        run: python scripts/validate_skills.py --opencode-compatible

      - name: Run tests
        run: python -m pytest -q

      - name: Ensure generated OpenCode artifacts are not committed
        run: |
          test ! -d .opencode
          test ! -f skills-index.json
